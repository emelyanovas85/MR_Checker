# Docker Compose для MR_Checker с persistent H2 storage.
# Данные БД хранятся в named volume mr-checker-data и переживают:
#   - docker compose stop / start
#   - docker compose down / up  (БЕЗ флага -v)
#   - пересборку образа
#
# ВНИМАНИЕ: docker compose down -v удалит volume и все данные БД!
#
# Перед запуском скопируйте .env.example в .env и заполните обязательные переменные.

services:
  mr-checker:
    image: ${DOCKER_IMAGE:-mr-checker:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mr-checker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:8081"
      - "${H2_TCP_PORT:-9092}:9092"   # H2 TCP Server для DBeaver / IntelliJ
    volumes:
      - mr-checker-data:/data          # Persistent H2 database storage
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

      # ─── H2 БД ───────────────────────────────────────────────────────
      H2_DB_PATH: /data/h2/mr-checker
      H2_TCP_PORT: ${H2_TCP_PORT:-9092}
      H2_USER: ${H2_USER:-sa}
      H2_PASSWORD: ${H2_PASSWORD:-}

      # ─── OpenAI-совместимый LLM API ────────────────────────────
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://chat.ehd-zr.cbr.ru}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}
      OPENAI_COMPLETIONS_PATH: ${OPENAI_COMPLETIONS_PATH:-/openai/chat/completions}

      # ─── GitLab ─────────────────────────────────────────────────────
      GITLAB_URL: ${GITLAB_URL:-http://10.1.5.6/}
      GITLAB_TOKEN: ${GITLAB_TOKEN}

      # ─── java-class-context ─────────────────────────────────────────
      CLASS_CONTEXT_URL: ${CLASS_CONTEXT_URL:-http://10.1.5.97:8084}
      CLASS_CONTEXT_GITLAB_TOKEN: ${CLASS_CONTEXT_GITLAB_TOKEN}

      # ─── webhook-distributor ─────────────────────────────────────────
      WEBHOOK_DISTRIBUTOR_URL: ${WEBHOOK_DISTRIBUTOR_URL:-http://10.1.5.97:8081}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── GitLab MCP Server (собирается из исходников zereight/gitlab-mcp) ────────
  #
  # ПОЧЕМУ НЕ zereight050/gitlab-mcp:latest с Docker Hub?
  # Тот образ — устаревший сторонний форк без тулов для комментариев:
  #   create_note, create_merge_request_thread, mr_discussions,
  #   resolve_merge_request_thread, add_merge_request_thread_note.
  #
  # Этот сервис собирается локально из gitlab-mcp/Dockerfile,
  # который клонирует upstream github.com/zereight/gitlab-mcp и
  # компилирует TypeScript — все 50+ инструментов включены.
  #
  # Первый запуск: docker compose build gitlab-mcp  (требует доступ к GitHub)
  # Затем:        docker compose up -d
  #
  # Open WebUI подключается как Tool Server:
  #   URL:  http://<host>:8083/mcp
  #   Type: mcp
  #
  # Эндпоинты:
  #   GET  /health — health check
  #   POST /mcp    — MCP Streamable HTTP (JSON-RPC 2.0)
  gitlab-mcp:
    build:
      context: ./gitlab-mcp
      dockerfile: Dockerfile
      args:
        # Пин на конкретный тег/коммит для воспроизводимых сборок.
        # Замените на нужный тег: BUILD_REF=v2.1.28
        BUILD_REF: ${ZEREIGHT_MCP_REF:-main}
    image: zereight-gitlab-mcp:local
    container_name: gitlab-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8083}:3002"
    environment:
      # GitLab Personal Access Token (права: api, read_repository)
      GITLAB_PERSONAL_ACCESS_TOKEN: ${GITLAB_TOKEN}
      # URL GitLab API v4
      GITLAB_API_URL: ${GITLAB_API_URL:-http://10.1.5.6/api/v4}
      # Включить Streamable HTTP транспорт (требуется для Open WebUI v0.9.6+)
      STREAMABLE_HTTP: "true"
      HOST: "0.0.0.0"
      PORT: "3002"
      # Группы инструментов — включаем все.
      # Можно ограничить: "merge_requests,notes,issues,repository"
      TOOL_CATEGORIES: "all"
      # Опционально: только чтение
      #GITLAB_READ_ONLY_MODE: "true"
      # Опционально: wiki-инструменты
      #USE_GITLAB_WIKI: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# Named volume — данные живут вне контейнера.
volumes:
  mr-checker-data:
    name: mr-checker-data
