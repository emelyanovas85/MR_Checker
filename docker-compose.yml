# Docker Compose для MR_Checker с persistent H2 storage.
# Данные БД хранятся в named volume mr-checker-data и переживают:
#   - docker compose stop / start
#   - docker compose down / up  (БЕЗ флага -v)
#   - пересборку образа
#
# ВНИМАНИЕ: docker compose down -v удалит volume и все данные БД!
#
# Перед запуском скопируйте .env.example в .env и заполните обязательные переменные.

services:
  mr-checker:
    image: ${DOCKER_IMAGE:-mr-checker:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mr-checker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:8081"
      - "${H2_TCP_PORT:-9092}:9092"   # H2 TCP Server для DBeaver / IntelliJ
    volumes:
      - mr-checker-data:/data          # Persistent H2 database storage
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

      # ─── H2 БД ───────────────────────────────────────────────────────
      H2_DB_PATH: /data/h2/mr-checker
      H2_TCP_PORT: ${H2_TCP_PORT:-9092}
      H2_USER: ${H2_USER:-sa}
      H2_PASSWORD: ${H2_PASSWORD:-}

      # ─── OpenAI-совместимый LLM API ────────────────────────────
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://chat.ehd-zr.cbr.ru}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}
      OPENAI_COMPLETIONS_PATH: ${OPENAI_COMPLETIONS_PATH:-/openai/chat/completions}

      # ─── GitLab ─────────────────────────────────────────────────────
      GITLAB_URL: ${GITLAB_URL:-http://10.1.5.6/}
      GITLAB_TOKEN: ${GITLAB_TOKEN}

      # ─── java-class-context ─────────────────────────────────────────
      CLASS_CONTEXT_URL: ${CLASS_CONTEXT_URL:-http://10.1.5.97:8084}
      CLASS_CONTEXT_GITLAB_TOKEN: ${CLASS_CONTEXT_GITLAB_TOKEN}

      # ─── webhook-distributor ─────────────────────────────────────────
      WEBHOOK_DISTRIBUTOR_URL: ${WEBHOOK_DISTRIBUTOR_URL:-http://10.1.5.97:8081}

      # ─── MCP сервер (jmrplens/gitlab-mcp-server) ────────────────────
      MCP_SERVER_URL: http://supergateway-gitlab:8811/mcp

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      supergateway-gitlab:
        condition: service_healthy

  # ─── GitLab MCP (jmrplens/gitlab-mcp-server через supergateway) ─────
  #
  # jmrplens/gitlab-mcp-server — Go-бинарник, 866 actions для GitLab Free/CE.
  # Протестирован на GitLab 13.11.1: connection verified, 866 actions registered.
  # WARN «failed to detect PAT scopes, 404» — ожидаемо для 13.11 (endpoint
  # /personal_access_tokens/self появился в 14.10). Все инструменты регистрируются.
  #
  # supergateway транслирует stdio ↔ Streamable HTTP (порт 8811).
  # Open WebUI подключается к http://supergateway-gitlab:8811/mcp как MCP-сервер.
  supergateway-gitlab:
    image: supercorp/supergateway:latest
    container_name: supergateway-gitlab
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8811}:8811"
    environment:
      # supergateway запускает MCP-сервер как дочерний процесс через stdio
      # и выставляет его наружу как Streamable HTTP на порту 8811.
      SUPERGATEWAY_PORT: 8811
    command: >
      --port 8811
      --stdio
      "docker run -i --rm
        --network host
        -e GITLAB_URL=${GITLAB_URL:-http://10.1.5.6}
        -e GITLAB_TOKEN=${GITLAB_TOKEN}
        -e GITLAB_TIER=free
        -e GITLAB_SKIP_TLS_VERIFY=true
        -e TOOL_SURFACE=meta
        ghcr.io/jmrplens/gitlab-mcp-server:latest
        --http=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # supergateway запускает docker run
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8811/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# Named volume — данные живут вне контейнера.
volumes:
  mr-checker-data:
    name: mr-checker-data
