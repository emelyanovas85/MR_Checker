# Docker Compose для MR_Checker с persistent H2 storage.
# Данные БД хранятся в named volume mr-checker-data и переживают:
#   - docker compose stop / start
#   - docker compose down / up  (БЕЗ флага -v)
#   - пересборку образа
#
# ВНИМАНИЕ: docker compose down -v удалит volume и все данные БД!
#
# Перед запуском скопируйте .env.example в .env и заполните обязательные переменные.

services:
  mr-checker:
    image: ${DOCKER_IMAGE:-mr-checker:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mr-checker
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:8081"
      - "${H2_TCP_PORT:-9092}:9092"   # H2 TCP Server для DBeaver / IntelliJ
    volumes:
      - mr-checker-data:/data          # Persistent H2 database storage
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

      # ─── H2 БД ───────────────────────────────────────────────────────
      # Файлы БД хранятся в /data внутри volume
      H2_DB_PATH: /data/h2/mr-checker
      H2_TCP_PORT: ${H2_TCP_PORT:-9092}
      H2_USER: ${H2_USER:-sa}
      H2_PASSWORD: ${H2_PASSWORD:-}

      # ─── OpenAI-совместимый LLM API ────────────────────────────
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://chat.ehd-zr.cbr.ru}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}
      OPENAI_COMPLETIONS_PATH: ${OPENAI_COMPLETIONS_PATH:-/openai/chat/completions}

      # ─── GitLab ─────────────────────────────────────────────────────
      GITLAB_URL: ${GITLAB_URL:-http://10.1.5.6/}
      GITLAB_TOKEN: ${GITLAB_TOKEN}

      # ─── java-class-context ─────────────────────────────────────────
      CLASS_CONTEXT_URL: ${CLASS_CONTEXT_URL:-http://10.1.5.97:8084}
      # Важно: вложенные подстановки Docker Compose не поддерживает.
      # Если CLASS_CONTEXT_GITLAB_TOKEN = GITLAB_TOKEN, задайте явно в .env.
      CLASS_CONTEXT_GITLAB_TOKEN: ${CLASS_CONTEXT_GITLAB_TOKEN}

      # ─── webhook-distributor ─────────────────────────────────────────
      WEBHOOK_DISTRIBUTOR_URL: ${WEBHOOK_DISTRIBUTOR_URL:-http://10.1.5.97:8081}

      # ─── Промпты (опционально, если нужно переопределить без пересборки) ──
      # Пропишите и смонтируйте файл через volumes (см. ниже):
      #APP_AI_GROUPING_PROMPT_FILE: file:/etc/mr-checker/grouping-prompt.md
      #APP_AI_REVIEW_PROMPT_FILE:   file:/etc/mr-checker/system-prompt.md

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Опционально: подключить кастомные промпты без пересборки:
    # volumes:
    #   - mr-checker-data:/data
    #   - ./my-grouping-prompt.md:/etc/mr-checker/grouping-prompt.md:ro
    #   - ./my-system-prompt.md:/etc/mr-checker/system-prompt.md:ro

  # ─── GitLab MCP Server (zereight/gitlab-mcp) ─────────────────────────────
  # Предоставляет MCP-инструменты для работы с GitLab через Streamable HTTP.
  # Open WebUI подключается как Tool Server: URL http://<host>:8083, Type: mcp
  #
  # Образ с Docker Hub (ghcr.io заблокирован корпоративным прокси).
  # Streamable HTTP транспорт встроен — supergateway не нужен.
  #
  # Эндпоинты:
  #   GET  /health  — health check
  #   POST /mcp     — MCP Streamable HTTP (JSON-RPC)
  gitlab-mcp:
    image: zereight050/gitlab-mcp:latest
    container_name: gitlab-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-8083}:3000"
    environment:
      # GitLab Personal Access Token (права: api, read_repository)
      GITLAB_PERSONAL_ACCESS_TOKEN: ${GITLAB_TOKEN}
      # URL GitLab API v4
      GITLAB_API_URL: ${GITLAB_API_URL:-http://10.1.5.6/api/v4}
      # Включить Streamable HTTP транспорт (требуется для Open WebUI v0.9.6+)
      STREAMABLE_HTTP: "true"
      HOST: "0.0.0.0"
      PORT: "3000"
      # Опционально: только чтение (без create/update/delete операций)
      #GITLAB_READ_ONLY_MODE: "true"
      # Опционально: включить wiki-инструменты
      #USE_GITLAB_WIKI: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# Named volume — данные живут вне контейнера.
# Путь на хосте управляется Docker Engine (обычно /var/lib/docker/volumes/).
# Для конкретного bind mount замените на: driver: local + device: /host/path
volumes:
  mr-checker-data:
    name: mr-checker-data
