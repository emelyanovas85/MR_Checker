# Локальный профиль для разработки
# H2 хранится в домашней директории разработчика
spring:
  datasource:
    url: jdbc:h2:file:${H2_DB_PATH:${user.home}/.mr-checker/db/mr-checker};AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE
  h2:
    console:
      enabled: true
      path: /h2-console

# Подключение из DBeaver / IntelliJ Database:
#   Тип:      H2 Server
#   JDBC URL: jdbc:h2:tcp://localhost:9092/~/.mr-checker/db/mr-checker
#   User:     sa
#   Password: (пусто)
