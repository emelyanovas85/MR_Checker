spring:
  application:
    name: git-webhook-handler
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # ─────────────────────────────────────────────
  # H2 file-based БД (данные переживают рестарт контейнера)
  # Путь задаётся через переменную H2_DB_PATH;
  # дефолт — /data/h2/mr-checker (монтируется как Docker volume).
  # ─────────────────────────────────────────────
  datasource:
    url: jdbc:h2:file:${H2_DB_PATH:/data/h2/mr-checker};AUTO_SERVER=FALSE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: ${H2_USER:sa}
    password: ${H2_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # H2 web-консоль — только для профилей local/dev, в prod отключена
  h2:
    console:
      enabled: false
      path: /h2-console

  # Отключаем стандартный маппинг favicon.ico чтобы не засорять логи
  mvc:
    favicon:
      enabled: false

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://chat.ehd-zr.cbr.ru}
      api-key: ${OPENAI_API_KEY:Bearer sk-09fd660cdc8640ac861fe85a16d2d2f1}
      chat:
        options:
          model: ${OPENAI_MODEL:Qwen/Qwen3.5-397B-A17B-GPTQ-Int4}
          temperature: 0.3
        completions-path: ${OPENAI_COMPLETIONS_PATH:/openai/chat/completions}

    # ─────────────────────────────────────────────
    # MCP-клиент: подключение к внешним MCP-серверам по Streamable HTTP.
    # Spring AI 2.0 при старте вызывает tools/list на каждом сервере
    # и регистрирует все инструменты как Spring AI Tools через service-connection.
    # ─────────────────────────────────────────────
    mcp:
      client:
        toolcallback:
          enabled: true
        connections:
          # GitLab MCP Server: supergateway поверх mcp/gitlab (node dist/index.js)
          # Развёрнут через deploy-gitlab-mcp.sh, endpoint: POST /mcp
          gitlab-mcp:
            url: ${MCP_GITLAB_URL:http://10.1.5.97:8083}
            transport-type: HTTP
          # Java Class Context MCP-wrapper (spring-ai-starter-mcp-server-webmvc)
          # Развёрнут через java-class-context-deploy, endpoint: /mcp
          java-class-context:
            url: ${MCP_CLASS_CONTEXT_URL:http://10.1.5.97:8084}
            transport-type: HTTP

server:
  port: 8081
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

webhook:
  client:
    server-url: ${WEBHOOK_DISTRIBUTOR_URL:http://10.1.5.97:8081}
    subscriber-id: MR_Checker
    source: gitlab
    target-endpoint: gitlab.merge-request
    event-type-filter:
      - Merge Request Hook
    missed-events-on-reconnect: true
    missed-events-batch-size: 50
    reconnect-delay-ms: 3000
    max-reconnect-delay-ms: 30000

# H2 TCP-сервер для внешних клиентов (DBeaver, IntelliJ Database)
# Активен только вне тестового профиля (см. H2TcpServerConfig)
h2:
  tcp-server:
    port: ${H2_TCP_PORT:9092}
    allowed-hosts: localhost,127.0.0.1

app:
  gitlab:
    url: ${GITLAB_URL:http://10.1.5.6/}
    token: ${GITLAB_TOKEN:Wg2zKVFW6ZogLt1D3dHQ}
  class-context:
    url: ${CLASS_CONTEXT_URL:http://10.1.5.97:8084}
    gitlab-token: ${CLASS_CONTEXT_GITLAB_TOKEN:${GITLAB_TOKEN:Wg2zKVFW6ZogLt1D3dHQ}}
  ai:
    grouping-prompt-file: ${APP_AI_GROUPING_PROMPT_FILE:classpath:prompts/grouping-prompt.md}
    review-prompt-file: ${APP_AI_REVIEW_PROMPT_FILE:classpath:prompts/system-prompt.md}
