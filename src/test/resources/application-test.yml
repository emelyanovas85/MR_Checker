# Тестовый профиль: H2 in-memory, H2TcpServer не запускается
spring:
  datasource:
    url: jdbc:h2:mem:mr-checker-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false
